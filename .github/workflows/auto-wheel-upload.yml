name: Auto Wheel Upload

on:
  pull_request:
    types: [opened, edited, synchronize]
    paths:
      - 'wheel-requests/**'

jobs:
  process-wheel-request:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Build llpkgstore
        run: |
          cd cmd/llpkgstore
          go build -o llpkgstore .

      - name: Process wheel request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO_OWNER: Bigdata-shiyang
          TARGET_REPO_NAME: test
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.event.repository.name }}
        run: |
          cd cmd/llpkgstore
          ./llpkgstore wheel-upload ${{ github.event.number }}

      - name: Add success label
        if: success()
        run: |
          gh pr edit ${{ github.event.number }} --add-label "wheel-added"
          gh pr edit ${{ github.event.number }} --remove-label "wheel-request"

      - name: Add failure label
        if: failure()
        run: |
          gh pr edit ${{ github.event.number }} --add-label "wheel-failed"
          gh pr edit ${{ github.event.number }} --remove-label "wheel-request" 